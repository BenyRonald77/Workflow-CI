name: MLflow CI Training

on:
  push:
    branches:
      - main
    paths-ignore:
      - "MLProject/mlruns/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn==1.5.2 mlflow==2.19.0

      - name: Run MLflow Project
        working-directory: MLProject
        run: |
          mlflow run . --env-manager=local

      - name: Commit MLflow Artifacts
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add MLProject/mlruns
          git commit -m "Add MLflow artifacts from CI [skip ci]" || echo "No changes to commit"
          git push